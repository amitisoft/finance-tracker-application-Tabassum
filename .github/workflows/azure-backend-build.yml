name: Backend + frontend CI/CD

on:
  push:
    branches: [ main ]

jobs:
  backend:
    name: Build & deploy backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Spring Boot jar
        run: mvn -f backend/pom.xml -DskipTests clean package

      - name: Copy executable jar
        run: |
          cp backend/target/finance-tracker-backend-0.1.0-SNAPSHOT.jar backend/target/app.jar

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy via Azure CLI
        run: |
          az webapp deploy \
<<<<<<< HEAD
            --resource-group finance-tracker-rg \
=======
            --resource-group <YOUR_RESOURCE_GROUP> \
>>>>>>> 72a8b33 (Use Azure CLI for backend deploy)
            --name finance-api-123 \
            --src-path backend/target/app.jar \
            --type jar

  frontend:
    name: Build frontend bundle
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Run frontend build
        run: npm run build
        working-directory: frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
